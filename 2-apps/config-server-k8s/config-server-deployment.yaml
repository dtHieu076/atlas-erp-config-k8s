apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-server-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-server
  template:
    metadata:
      labels:
        app: config-server
    spec:
      containers:
      - name: config-server-container
        image: dthieudocker/config-server:v2
        ports:
        - containerPort: 8888
        env:
        - name: SPRING_CLOUD_CONFIG_SERVER_GIT_URI
          value: "https://github.com/dtHieu076/atlas-erp-config-repo.git"
        - name: SPRING_SECURITY_USER_NAME
          value: "atlas_admin"
        - name: SPRING_SECURITY_USER_PASSWORD
          value: "erp_password_2026"