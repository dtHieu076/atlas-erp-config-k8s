apiVersion: apps/v1
kind: Deployment
metadata:
  name: mail-deployment
  labels:
    app: mail-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mail-api
  template:
    metadata:
      labels:
        app: mail-api
      annotations:
        # Giķp Velero nh?n di?n volume d? backup
        backup.velero.io/backup-volumes: backup-storage
    spec:
      containers:
      - name: mail-container
        image: dthieudocker/mail-service:22ad0cd76a4eb9beabdc7304c2c47da95c7cd7ee
        imagePullPolicy: Always  # …p K8s luŰn kťo image m?i nh?t n?u b?n ců l? ghi dŤ tag v2
        ports:
        - containerPort: 8080
        env:
        # ==========================================================
        # PH?N TH M M?I: …p Spring Boot k?t n?i sang MailHog Service
        # ==========================================================
        - name: SPRING_MAIL_HOST
          value: "mailhog-service"
        - name: SPRING_MAIL_PORT
          value: "1025"
        # ==========================================================
        volumeMounts:
        # Mount vŗo dķng thu m?c Java ghi file
        - name: backup-storage
          mountPath: /app/backups
      volumes:
      - name: backup-storage
        persistentVolumeClaim:
          claimName: shared-backup-pvc