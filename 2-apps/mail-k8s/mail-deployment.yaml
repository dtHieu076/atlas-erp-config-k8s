apiVersion: apps/v1
kind: Deployment
metadata:
  name: mail-deployment
  labels:
    app: mail-api
spec:
  replicas: 0
  selector:
    matchLabels:
      app: mail-api
  template:
    metadata:
      labels:
        app: mail-api
      annotations:
        # Gi�p Velero nh?n di?n volume d? backup
        backup.velero.io/backup-volumes: backup-storage
    spec:
      containers:
        - name: mail-container
          image: dthieudocker/mail-service:b9fbdc307267f99360ba7f5ef7013eef645ba97f
          imagePullPolicy: Always # �p K8s lu�n k�o image m?i nh?t n?u b?n c� l? ghi d� tag v2
          ports:
            - containerPort: 8080
          env:
            # ==========================================================
            # PH?N TH�M M?I: �p Spring Boot k?t n?i sang MailHog Service
            # ==========================================================
            - name: SPRING_MAIL_HOST
              value: "mailhog-service"
            - name: SPRING_MAIL_PORT
              value: "1025"
            # ==========================================================
          volumeMounts:
            # Mount v�o d�ng thu m?c Java ghi file
            - name: backup-storage
              mountPath: /app/backups
      volumes:
        - name: backup-storage
          persistentVolumeClaim:
            claimName: shared-backup-pvc
