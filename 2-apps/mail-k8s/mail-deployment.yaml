apiVersion: apps/v1
kind: Deployment
metadata:
  name: mail-deployment
  labels:
    app: mail-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mail-api
  template:
    metadata:
      labels:
        app: mail-api
      annotations:
        backup.velero.io/backup-volumes: backup-storage
    spec:
      containers:
        - name: mail-container
          image: dthieudocker/mail-service:b9fbdc307267f99360ba7f5ef7013eef645ba97f
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_MAIL_HOST
              value: "mailhog-service"
            - name: SPRING_MAIL_PORT
              value: "1025"
          volumeMounts:
            - name: backup-storage
              mountPath: /app/backups
      volumes:
        - name: backup-storage
          persistentVolumeClaim:
            claimName: shared-backup-pvc
