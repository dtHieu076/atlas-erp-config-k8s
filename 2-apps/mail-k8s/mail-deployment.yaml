apiVersion: apps/v1
kind: Deployment
metadata:
  name: mail-deployment
  labels:
    app: mail-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mail-api
  template:
    metadata:
      labels:
        app: mail-api
      annotations:
        # Giºp Velero nh?n di?n volume d? backup
        backup.velero.io/backup-volumes: backup-storage
    spec:
      containers:
      - name: mail-container
        image: dthieudocker/mail-service:ace077d6c368ced7f86b15470ccd51c0e3aff337
        imagePullPolicy: Always  # èp K8s lu¶n kÕo image m?i nh?t n?u b?n cµ l? ghi dÒ tag v2
        ports:
        - containerPort: 8080
        env:
        # ==========================================================
        # PH?N THòM M?I: èp Spring Boot k?t n?i sang MailHog Service
        # ==========================================================
        - name: SPRING_MAIL_HOST
          value: "mailhog-service"
        - name: SPRING_MAIL_PORT
          value: "1025"
        # ==========================================================
        volumeMounts:
        # Mount vÁo dºng thu m?c Java ghi file
        - name: backup-storage
          mountPath: /app/backups
      volumes:
      - name: backup-storage
        persistentVolumeClaim:
          claimName: shared-backup-pvc