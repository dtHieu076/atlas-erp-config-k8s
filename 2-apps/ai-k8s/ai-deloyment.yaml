apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-api
  template:
    metadata:
      labels:
        app: ai-api
    spec:
      containers:
      - name: ai-container
        image: dthieudocker/ai-service:c8e7505c62d45ebeeb96c287f8351abbf699ddfa
        ports:
        - containerPort: 8080
        env:
        - name: JAVA_TOOL_OPTIONS
          value: "-Djava.net.preferIPv4Stack=true -Dio.netty.resolver.dns.preferIpv4=true"
        - name: MANAGEMENT_OTLP_METRICS_EXPORT_ENABLED
          value: "false"