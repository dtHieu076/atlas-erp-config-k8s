# 1. T?o ServiceAccount riÍng cho Admin (? namespace default)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: admin-sa
  namespace: default
---
# 2. –?nh nghia quy?n t?o Backup (? namespace velero)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: velero
  name: velero-backup-creator
rules:
- apiGroups: ["velero.io"]
  resources: ["backups"]
  verbs: ["create", "get", "list", "watch"]
---
# 3. G?n quy?n cho t‡i kho?n admin-sa
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: velero-backup-creator-binding
  namespace: velero
subjects:
- kind: ServiceAccount
  name: admin-sa
  namespace: default # Tr? v? admin-sa ? namespace default
roleRef:
  kind: Role
  name: velero-backup-creator
  apiGroup: rbac.authorization.k8s.io