apiVersion: v1
kind: PersistentVolume
metadata:
  name: shared-backup-pv
spec:
  capacity:
    storage: 10Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany 
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  nfs:
    server: 103.72.99.199
    path: /data/shared-erp-backups
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: shared-backup-pvc
  namespace: default
spec:
  storageClassName: manual
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi

