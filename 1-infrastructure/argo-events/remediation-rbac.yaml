apiVersion: v1
kind: ServiceAccount
metadata:
  name: remediation-sa
  namespace: argo-events # Tạo ở đây để Sensor "nhìn thấy" và khởi chạy được Pod
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: remediation-role
rules:
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "patch", "list", "watch"]
- apiGroups: ["argoproj.io"]
  resources: ["workflows"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: remediation-rolebinding
subjects:
- kind: ServiceAccount
  name: remediation-sa
  namespace: argo-events # Chỉ định đúng SA ở argo-events
roleRef:
  kind: ClusterRole
  name: remediation-role # Cấp quyền Cluster-wide (toàn cụm, bao gồm cả namespace argo)
  apiGroup: rbac.authorization.k8s.io