apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-webhook-ingress
  namespace: argo-events
  annotations:
    # Chỉ định dùng Kong
    kubernetes.io/ingress.class: "kong"
    # Nếu bạn muốn dùng HTTPS giống ArgoCD thì giữ lại dòng cert-manager
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    konghq.com/protocol: "http"
    konghq.com/strip-path: "false" 
spec:
  ingressClassName: kong # ĐỔI TỪ nginx SANG kong
  tls:
  - hosts:
    - webhook.103.72.99.195.nip.io # Domain cho Webhook
    secretName: grafana-webhook-tls
  rules:
  - host: webhook.103.72.99.195.nip.io
    http:
      paths:
      - path: /grafana
        pathType: Prefix
        backend:
          service:
            name: grafana-webhook-eventsource-svc
            port:
              number: 12000