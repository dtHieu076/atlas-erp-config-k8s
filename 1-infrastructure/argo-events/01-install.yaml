apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-events-system
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/argoproj/argo-events.git
    targetRevision: stable
    path: manifests/namespace-install # Cài đặt bản chuẩn
  destination:
    server: https://kubernetes.default.svc
    namespace: argo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true