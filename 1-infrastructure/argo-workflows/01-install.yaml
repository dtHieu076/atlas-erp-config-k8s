apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-workflows-system
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://argoproj.github.io/argo-helm'
    chart: argo-workflows
    targetRevision: 0.40.x # Phiên bản Helm chart
  destination:
    server: https://kubernetes.default.svc
    namespace: argo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true