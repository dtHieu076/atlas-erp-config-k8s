    targetRevision: "^3"
    chart: k8s-monitoring
    helm:
      values: |
        cluster:
          name: k3s-cluster  # Giữ nguyên hoặc đổi tùy ý bạn
        destinations:
          - name: grafana-cloud-metrics
            type: prometheus
            url: https://prometheus-prod-37-prod-ap-southeast-1.grafana.net./api/prom/push
