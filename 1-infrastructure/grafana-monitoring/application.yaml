              username: "1502580"
              password: glc_eyJvIjoiMTY4NjI1NSIsIm4iOiJzdGFjay0xNTQ0NzkxLWludGVncmF0aW9uLWszcy1tb25pdG9yaW5nLXRva2VuLWszcy1tb25pdG9yaW5nLXRva2VuIiwiayI6Im1qODVVMkE1YjF3UjM2MlZtMXpCcDJQQyIsIm0iOnsiciI6InByb2QtYXAtc291dGhlYXN0LTEifX0=
        clusterMetrics:
          enabled: true
          opencost:
            enabled: true
            metricsSource: grafana-cloud-metrics
            opencost:
              exporter:
                defaultClusterId: k3s-cluster
              prometheus:
                existingSecretName: grafana-cloud-metrics-grafana-k8s-monitoring
                external:
                  url: https://prometheus-prod-37-prod-ap-southeast-1.grafana.net./api/prom
          kepler:
            enabled: true
        clusterEvents:
          enabled: true
        podLogs:
          enabled: true
        alloy-metrics:
          enabled: true
          alloy:
            extraEnv:
              - name: CLUSTER_NAME
                value: k3s-cluster
